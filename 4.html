<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Weather App - ES6 Features</title>
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <style>
 body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
 input, button { padding: 8px; margin: 5px; }
 canvas { max-width: 700px; margin: 20px auto; display: block; }
 </style>
</head>
<body>
 <h1>Weather Forecast (OpenWeatherMap)</h1>
 <input type="text" id="city" placeholder="Enter City Name" />
 <button id="getWeather">Get Weather</button>
 <canvas id="weatherChart"></canvas>
 <script>
 let weatherChart; // chart instance
 // Arrow function for logging
 const logMessage = msg => console.log(msg);
 // Callback example: fetch weather data
 function fetchData(city, callback) {
 const apiKey = "YOUR_OWN_APIKEY"; // 🔑 replace with your API key
 const url =
`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`;
 fetch(url)
 .then(res => res.json())
 .then(data => callback(null, data))
 .catch(err => callback(err, null));
 }
 // Promise wrapper
 const fetchWeatherPromise = city => {
 return new Promise((resolve, reject) => {
 fetchData(city, (err, data) => {
 if (err) reject(err);
 else if (data.cod !== "200") reject(data.message); // city not found
 else resolve(data);
 });
 });
 };
 // Async/Await usage
 async function getWeather(city) {
 try {
 const data = await fetchWeatherPromise(city);
 displayWeatherChart(data);
 } catch (error) {
 if (weatherChart) weatherChart.destroy();
 alert("Error: " + error);
 }
 }
 // Chart.js to display weather
 const displayWeatherChart = data => {
 const labels = data.list.slice(0, 7).map(item => item.dt_txt);
 const temps = data.list.slice(0, 7).map(item => item.main.temp);
 const ctx = document.getElementById("weatherChart").getContext("2d");
 if (weatherChart) weatherChart.destroy(); // clear old chart
 weatherChart = new Chart(ctx, {
 type: "line",
 data: {
 labels: labels,
 datasets: [{
 label: `Temperature (°C) in ${data.city.name}`,
 data: temps,
 borderColor: "blue",
 backgroundColor: "lightblue",
 fill: true,
 tension: 0.3
 }]
 },
 options: { responsive: true }
 });
 };
 // Event listener
 document.getElementById("getWeather").addEventListener("click", () => {
 const city = document.getElementById("city").value.trim();
 if (city) getWeather(city);
 else alert("Please enter a city name");
 });
 </script>
</body>
</html>
<!-- Explanation:
1. HTML Structure: We have a simple HTML structure with a container for the
graph canvas.
2. CSS Styling: Basic styling to make the application look presentable.
3. JavaScript (script.js):
• The fetchData function uses axios to make an asynchronous HTTP request to
OpenWeatherMap API.
• The retrieved weather data is used to update the graph using the
updateGraph function.
• The graph is created using the Chart.js library.
4. API Key: Replace 'YOUR_OPENWEATHERMAP_API_KEY' with your
OpenWeatherMap API key and 'YOUR_CITY_NAME' with the desired city.
