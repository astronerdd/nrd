<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.page{ display:none; }
.page.active{ display:block; }
</style>

</head>

<body>

<!-- Navbar -->
<nav class="bg-dark text-white p-2 text-center">
 Shopping Cart <br>
 <button class="btn btn-light btn-sm" onclick="showPage('home')">Home</button>
 <button class="btn btn-light btn-sm" onclick="showPage('register')">Register</button>
 <button class="btn btn-light btn-sm" onclick="showPage('login')">Login</button>
 <button class="btn btn-light btn-sm" onclick="showPage('catalog')">Catalog</button>
 <button class="btn btn-light btn-sm" onclick="showPage('cart')">Cart</button>
</nav>

<!-- Home -->
<div class="page active text-center mt-4" id="home">
 <h2>Welcome</h2>
</div>

<!-- Register -->
<div class="page" id="register">
 <div class="card p-3 mt-4 mx-auto" style="width:300px;">
  <h3 class="text-center">Register</h3>
  <input id="rUser" class="form-control my-2" placeholder="Username">
  <input id="rPass" type="password" class="form-control my-2" placeholder="Password">
  <button class="btn btn-primary w-100" onclick="register()">Register</button>
 </div>
</div>

<!-- Login -->
<div class="page" id="login">
 <div class="card p-3 mt-4 mx-auto" style="width:300px;">
  <h3 class="text-center">Login</h3>
  <input id="lUser" class="form-control my-2" placeholder="Username">
  <input id="lPass" type="password" class="form-control my-2" placeholder="Password">
  <button class="btn btn-success w-100" onclick="login()">Login</button>
 </div>
</div>

<!-- Catalog -->
<div class="page text-center mt-4" id="catalog">

 <div class="card p-3 m-3 d-inline-block" style="width:200px;">
  <h5>Product 1</h5>
  <p>₹500</p>
  <button class="btn btn-primary btn-sm" onclick="addToCart('Product 1',500)">Add</button>
 </div>

 <div class="card p-3 m-3 d-inline-block" style="width:200px;">
  <h5>Product 2</h5>
  <p>₹700</p>
  <button class="btn btn-primary btn-sm" onclick="addToCart('Product 2',700)">Add</button>
 </div>

</div>

<!-- Cart -->
<div class="page" id="cart">
 <div class="card p-3 mt-4 mx-auto" style="width:350px;">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h5>Total: ₹<span id="total">0</span></h5>
 </div>
</div>

<script>

let cart = [];
let user = "", pass = "";

// Page switch
function showPage(id){
 document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// Register
function register(){
 let u = rUser.value, p = rPass.value;
 if(u=="" || p==""){ alert("Fill all"); return; }
 user = u; pass = p;
 alert("Registered");
 showPage('login');
}

// Login
function login(){
 let u = lUser.value, p = lPass.value;
 if(u!=user || p!=pass){ alert("Invalid"); return; }
 alert("Login Success");
 showPage('catalog');
}

// Add to cart
function addToCart(name, price){
 cart.push({name, price});
 updateCart();
}

// Remove item
function removeFromCart(i){
 cart.splice(i,1);
 updateCart();
}

// Update cart
function updateCart(){
 let items = document.getElementById("cartItems");
 items.innerHTML = "";
 let total = 0;

 cart.forEach((item,i)=>{
  items.innerHTML += `
   <div>
    ${item.name} - ₹${item.price}
    <button onclick="removeFromCart(${i})">X</button>
   </div>`;
  total += item.price;
 });

 document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
